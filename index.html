<script>
  console.log('[INIT] Script loaded');

  const buttons = document.querySelectorAll('.amount-btn');
  const donate = document.getElementById('donateBtn');
  const base = 'https://give.redcross.ca/page/LHNA';

  console.log('[INIT] Found amount buttons:', buttons.length);
  console.log('[INIT] Donate button found:', !!donate);
  console.log('[INIT] Base donation URL:', base);
  console.log('[INIT] Current location:', window.location.href);
  console.log('[INIT] Referrer:', document.referrer || '(none)');
  console.log('[INIT] User agent:', navigator.userAgent);

  function track(event, details = {}) {
    const payload = {
      event,
      path: window.location.pathname,
      referrer: document.referrer || '',
      userAgent: navigator.userAgent,
      timestamp: new Date().toISOString(),
      ...details
    };

    console.log('[TRACK] Sending event:', event);
    console.log('[TRACK] Payload:', payload);

    fetch('/api/track', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      keepalive: true
    })
      .then(async (res) => {
        let bodyText = '';
        try {
          bodyText = await res.text();
        } catch (err) {
          console.warn('[TRACK] Could not read response body:', err);
        }

        console.log('[TRACK] Response status:', res.status);
        console.log('[TRACK] Response ok:', res.ok);
        console.log('[TRACK] Response body:', bodyText);
      })
      .catch((err) => {
        console.error('[TRACK] Request failed:', err);
      });
  }

  console.log('[PAGE] Tracking initial page view');
  track('page_view');

  buttons.forEach((btn, index) => {
    console.log(`[INIT] Button ${index} amount:`, btn.dataset.amount);

    btn.addEventListener('click', () => {
      console.log('[UI] Amount button clicked:', btn);
      console.log('[UI] Selected amount:', btn.dataset.amount);

      buttons.forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');

      const amt = btn.dataset.amount;
      donate.href = `${base}?amount=${amt}`;
      donate.textContent = `Donate $${amt} to the Lebanese Red Cross`;

      console.log('[UI] Donate button href updated to:', donate.href);
      console.log('[UI] Donate button text updated to:', donate.textContent);

      track('amount_selected', { amount: amt });
    });
  });

  donate.addEventListener('click', () => {
    const active = document.querySelector('.amount-btn.active');

    console.log('[UI] Donate button clicked');
    console.log('[UI] Active amount button:', active);
    console.log('[UI] Active amount:', active ? active.dataset.amount : null);
    console.log('[UI] Redirect target:', donate.href);

    track('donation_click', {
      amount: active ? active.dataset.amount : null,
      targetUrl: donate.href
    });
  });

  window.addEventListener('error', (e) => {
    console.error('[WINDOW ERROR]', e.message, 'at', e.filename, 'line', e.lineno, 'col', e.colno);
  });

  window.addEventListener('unhandledrejection', (e) => {
    console.error('[PROMISE ERROR]', e.reason);
  });
</script>
