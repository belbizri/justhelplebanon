name: Sync to Mirror Repo

on:
  push:
    branches:
      - dev
      - main
      - prod
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    name: Mirror branch to Basselbi/justhelplebanon
    env:
      TARGET_REPO: Basselbi/justhelplebanon

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate mirror token is configured
        run: |
          if [ -z "${{ secrets.GH_PAT }}" ]; then
            echo "ERROR: GH_PAT secret is missing or empty in this repository." >&2
            exit 1
          fi

      - name: Validate access to private target repo
        run: |
          git ls-remote "https://x-access-token:${{ secrets.GH_PAT }}@github.com/${TARGET_REPO}.git" HEAD >/dev/null

      - name: Add mirror remote
        run: |
          git remote add mirror https://x-access-token:${{ secrets.GH_PAT }}@github.com/${TARGET_REPO}.git || true
          git remote set-url mirror https://x-access-token:${{ secrets.GH_PAT }}@github.com/${TARGET_REPO}.git

      - name: Verify mirror remote target
        run: |
          URL="$(git remote get-url mirror)"
          echo "Mirror remote: ${URL}"
          case "${URL}" in
            *"github.com/${TARGET_REPO}.git"*) ;;
            *)
              echo "ERROR: Mirror target is not ${TARGET_REPO}" >&2
              exit 1
              ;;
          esac

      - name: Fetch from both remotes
        run: |
          git fetch origin
          git fetch mirror

      - name: Mirror pushed branch
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git push mirror "origin/${BRANCH}:${BRANCH}" -f

      - name: Remove credentials from config
        if: always()
        run: |
          git remote set-url mirror https://github.com/${TARGET_REPO}.git

      - name: Notify sync status
        if: always()
        run: |
          echo "Sync complete: ${GITHUB_REF_NAME} -> ${TARGET_REPO}:${GITHUB_REF_NAME}"
