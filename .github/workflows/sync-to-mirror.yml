name: Sync to Mirror Repo

on:
  push:
    branches:
      - dev
      - main
      - prod
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    name: Mirror branch to Basselbi/justhelplebanon

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add mirror remote
        run: |
          git remote add mirror https://${{ secrets.GH_PAT }}@github.com/Basselbi/justhelplebanon.git || true
          git remote set-url mirror https://${{ secrets.GH_PAT }}@github.com/Basselbi/justhelplebanon.git

      - name: Fetch from both remotes
        run: |
          git fetch origin
          git fetch mirror

      - name: Mirror pushed branch
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git push mirror "origin/${BRANCH}:${BRANCH}" -f

      - name: Remove credentials from config
        if: always()
        run: |
          git remote set-url mirror https://github.com/Basselbi/justhelplebanon.git

      - name: Notify sync status
        if: always()
        run: |
          echo "Sync complete: ${GITHUB_REF_NAME} -> Basselbi/justhelplebanon:${GITHUB_REF_NAME}"
