name: Sync to Mirror Repo

on:
  push:
    branches:
      - dev
      - main
      - prod
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    name: Mirror branch to Basselbi/justhelplebanon
    env:
      TARGET_REPO: Basselbi/justhelplebanon

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate mirror token is configured
        run: |
          if [ -z "${{ secrets.GH_PAT }}" ]; then
            echo "ERROR: GH_PAT secret is missing or empty in this repository." >&2
            exit 1
          fi

      - name: Validate token identity and repo visibility
        run: |
          set -euo pipefail

          echo "::group::Mirror debug context"
          echo "Repository: ${GITHUB_REPOSITORY}"
          echo "Branch: ${GITHUB_REF_NAME}"
          echo "Target repo: ${TARGET_REPO}"
          echo "::endgroup::"

          USER_STATUS="$(curl -sS -o /tmp/user-check.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/user)"

          if [ "${USER_STATUS}" != "200" ]; then
            echo "ERROR: Token identity check failed (HTTP ${USER_STATUS})." >&2
            cat /tmp/user-check.json
            exit 1
          fi

          AUTH_USER="$(sed -n 's/.*"login"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' /tmp/user-check.json | head -n 1)"
          AUTH_ID="$(sed -n 's/.*"id"[[:space:]]*:[[:space:]]*\([0-9][0-9]*\).*/\1/p' /tmp/user-check.json | head -n 1)"

          if [ -z "${AUTH_USER}" ]; then
            echo "ERROR: Could not parse token login from GitHub API /user response." >&2
            cat /tmp/user-check.json
            exit 1
          fi

          echo "AUTH_USER=${AUTH_USER}" >> "${GITHUB_ENV}"

          echo "Token authenticated as: ${AUTH_USER} (id=${AUTH_ID:-unknown})"

          REPO_STATUS="$(curl -sS -o /tmp/target-repo-check.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${TARGET_REPO})"

          echo "Repo visibility check HTTP status: ${REPO_STATUS}"

          if [ "${REPO_STATUS}" != "200" ]; then
            echo "ERROR: Token cannot access ${TARGET_REPO}." >&2
            echo "This usually means wrong token owner, missing repo selection on fine-grained token, or missing collaborator access." >&2
            cat /tmp/target-repo-check.json
            exit 1
          fi

          REPO_FULL_NAME="$(sed -n 's/.*"full_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' /tmp/target-repo-check.json | head -n 1)"
          REPO_PRIVATE="$(sed -n 's/.*"private"[[:space:]]*:[[:space:]]*\(true\|false\).*/\1/p' /tmp/target-repo-check.json | head -n 1)"
          CAN_PUSH="$(sed -n 's/.*"push"[[:space:]]*:[[:space:]]*\(true\|false\).*/\1/p' /tmp/target-repo-check.json | head -n 1)"

          echo "Resolved repo: ${REPO_FULL_NAME:-unknown}"
          echo "Repo private: ${REPO_PRIVATE:-unknown}"
          echo "Token push permission (if present): ${CAN_PUSH:-unknown}"

      - name: Validate access to private target repo
        run: |
          if ! OUTPUT="$(git ls-remote "https://${AUTH_USER}:${{ secrets.GH_PAT }}@github.com/${TARGET_REPO}.git" HEAD 2>&1)"; then
            echo "ERROR: git ls-remote failed for ${TARGET_REPO}" >&2
            echo "${OUTPUT}" >&2
            exit 1
          fi

      - name: Add mirror remote
        run: |
          git remote add mirror https://${AUTH_USER}:${{ secrets.GH_PAT }}@github.com/${TARGET_REPO}.git || true
          git remote set-url mirror https://${AUTH_USER}:${{ secrets.GH_PAT }}@github.com/${TARGET_REPO}.git

      - name: Verify mirror remote target
        run: |
          URL="$(git remote get-url mirror)"
          echo "Mirror remote: ${URL}"
          case "${URL}" in
            *"github.com/${TARGET_REPO}.git"*) ;;
            *)
              echo "ERROR: Mirror target is not ${TARGET_REPO}" >&2
              exit 1
              ;;
          esac

      - name: Fetch from both remotes
        run: |
          git fetch origin
          git fetch mirror

      - name: Mirror pushed branch
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git push mirror "origin/${BRANCH}:${BRANCH}" -f

      - name: Remove credentials from config
        if: always()
        run: |
          if git remote get-url mirror >/dev/null 2>&1; then
            git remote set-url mirror https://github.com/${TARGET_REPO}.git
          else
            echo "Skip cleanup: mirror remote was never created."
          fi

      - name: Notify sync status
        if: always()
        run: |
          echo "Sync complete: ${GITHUB_REF_NAME} -> ${TARGET_REPO}:${GITHUB_REF_NAME}"
